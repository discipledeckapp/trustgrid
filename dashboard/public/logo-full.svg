<!--
  TrustGrid Full Wordmark
  Network G mark + wordmark "TrustGrid"

  Dimensions: 200×48px (horizontal lockup)
  Font spec: Geist Sans SemiBold / Inter SemiBold, -0.02em tracking
  Note: Text is specified as paths here for font-independence
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 56" fill="none">
  <defs>
    <linearGradient id="logo-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#4F46E5"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>
  </defs>

  <!-- Network G mark (scaled to 56×56) -->
  <g transform="scale(0.56) translate(0, 0)">
    <!-- Outer arc -->
    <path d="M 21 26 C 21 26, 12 38, 12 50 C 12 62, 16 72, 24 80 C 32 88, 42 92, 52 92 C 62 92, 72 88, 80 80 C 88 72, 90 62, 90 50"
      stroke="url(#logo-gradient)" stroke-width="2.5" stroke-linecap="round" fill="none"/>
    <!-- Bar -->
    <path d="M 90 50 L 52 50 L 76 50" stroke="url(#logo-gradient)" stroke-width="2.5" stroke-linecap="round" fill="none"/>
    <!-- Upper fade -->
    <path d="M 21 26 C 28 16, 40 10, 52 10" stroke="url(#logo-gradient)" stroke-width="2.5" stroke-linecap="round" fill="none" opacity="0.6"/>
    <!-- Secondary network -->
    <path d="M 52 50 C 54 38, 62 34, 66 30" stroke="url(#logo-gradient)" stroke-width="1.2" stroke-linecap="round" stroke-dasharray="2 3" fill="none" opacity="0.4"/>
    <circle cx="66" cy="30" r="2.5" fill="url(#logo-gradient)" opacity="0.5"/>
    <!-- Arc nodes -->
    <circle cx="21" cy="26" r="3.5" fill="url(#logo-gradient)"/>
    <circle cx="12" cy="50" r="3"   fill="url(#logo-gradient)"/>
    <circle cx="24" cy="80" r="3"   fill="url(#logo-gradient)"/>
    <circle cx="52" cy="92" r="3.5" fill="url(#logo-gradient)"/>
    <circle cx="80" cy="80" r="3"   fill="url(#logo-gradient)"/>
    <circle cx="90" cy="50" r="3.5" fill="url(#logo-gradient)"/>
    <circle cx="52" cy="10" r="3"   fill="url(#logo-gradient)" opacity="0.6"/>
    <!-- Bar nodes -->
    <circle cx="52" cy="50" r="4"   fill="url(#logo-gradient)"/>
    <circle cx="64" cy="50" r="3"   fill="url(#logo-gradient)"/>
    <circle cx="76" cy="50" r="3.5" fill="url(#logo-gradient)"/>
  </g>

  <!-- Wordmark: TrustGrid -->
  <!-- Using text element — in production, replace with actual Plus Jakarta Sans font -->
  <text
    x="68"
    y="36"
    font-family="'Plus Jakarta Sans', 'Inter', 'Geist Sans', system-ui, sans-serif"
    font-size="22"
    font-weight="700"
    letter-spacing="-0.4"
    fill="#0F172A"
  >
    <tspan fill="#0F172A">Trust</tspan><tspan fill="url(#logo-gradient)">Grid</tspan>
  </text>
</svg>
