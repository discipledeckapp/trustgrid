name: Deploy API

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-api.yml'

jobs:
  deploy:
    name: Deploy to Render
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Check for destructive migrations
        working-directory: backend
        run: |
          # Fail the deploy if any migration contains DROP TABLE or DROP COLUMN
          if find src/prisma/migrations -name "*.sql" -newer .last-deploy-sha 2>/dev/null | \
             xargs grep -l "DROP TABLE\|DROP COLUMN" 2>/dev/null | grep -q .; then
            echo "⛔ Destructive migration detected. Review before deploying."
            exit 1
          fi
          echo "✅ No destructive migrations found"

      - name: Trigger Render deploy
        run: |
          curl -s -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}" \
            -H "Content-Type: application/json" \
            | jq .

      - name: Wait for deploy and health check
        run: |
          echo "Waiting 60s for Render to start the new deploy..."
          sleep 60
          for i in {1..10}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              "https://api.trustgrid.ng/api/v1/health/ping")
            if [ "$STATUS" = "200" ]; then
              echo "✅ Health check passed (attempt $i)"
              exit 0
            fi
            echo "⏳ Health check attempt $i — status $STATUS — retrying in 15s..."
            sleep 15
          done
          echo "❌ Health check failed after 10 attempts"
          exit 1

      - name: Notify on failure
        if: failure()
        run: |
          echo "Deploy failed — check Render dashboard and Sentry"
