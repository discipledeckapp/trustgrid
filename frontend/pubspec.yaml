name: trustgrid
description: TrustGrid — Community Workforce & Service Governance Platform
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.1.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Navigation
  go_router: ^12.0.0

  # State management
  flutter_riverpod: ^2.4.0
  riverpod_annotation: ^2.1.0

  # Networking
  dio: ^5.3.0
  pretty_dio_logger: ^1.3.1

  # Storage
  flutter_secure_storage: ^9.0.0
  shared_preferences: ^2.2.0

  # UI Components
  fl_chart: ^0.65.0
  cached_network_image: ^3.3.0
  shimmer: ^3.0.0
  badges: ^3.1.0
  percent_indicator: ^4.2.3

  # Utils
  intl: ^0.18.0
  timeago: ^3.6.0
  uuid: ^4.3.0
  image_picker: ^1.0.4

  # Icons
  cupertino_icons: ^1.0.6
  material_design_icons_flutter: ^7.0.7296

  # Localization
  flutter_localizations:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.0
  riverpod_generator: ^2.3.0
  json_serializable: ^6.7.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/

  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
        - asset: assets/fonts/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700
